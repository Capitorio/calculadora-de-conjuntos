<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Conjuntos</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-6">

        <!-- Título -->
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-2">
            <i class="fas fa-calculator mr-2"></i>
            Calculadora de Conjuntos
        </h1>
        <p class="text-center text-gray-500 mb-6">
            Sube archivos <span class="font-semibold">.txt</span> para empezar
        </p>

        <!-- U -->
        <div class="mb-4">
            <label class="font-semibold text-gray-700">Conjunto Universo (U)</label>
            <div class="flex mt-1">
                <span class="px-3 flex items-center bg-gray-100 border rounded-l-md">
                    <i class="fas fa-globe text-blue-500"></i>
                </span>
                <input type="file" id="archivoU" accept=".txt"
                    class="w-full border rounded-r-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
        </div>

        <hr class="my-4">

        <!-- CONTENEDOR -->
        <div id="contenedor-conjuntos" class="max-h-60 overflow-y-auto space-y-3">

            <!-- A -->
            <div>
                <label class="font-semibold text-gray-700">Conjunto A</label>
                <div class="flex mt-1">
                    <span class="px-3 flex items-center bg-gray-100 border rounded-l-md">
                        <i class="fas fa-layer-group"></i>
                    </span>
                    <input type="file" id="archivoA" accept=".txt"
                        class="w-full border rounded-r-md p-2">
                </div>
            </div>

        </div>

        <!-- BOTÓN AGREGAR -->
        <div class="flex justify-end mt-3">
            <button id="agregar"
                class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-md transition">
                <i class="fas fa-plus mr-1"></i> Agregar conjunto
            </button>
        </div>

        <!-- OPERACIONES -->
        <div class="grid grid-cols-3 gap-2 mt-6">
            <input type="text" id="selectConjunto1" placeholder="A"
                class="border p-2 rounded-md text-center">

            <select id="selectOperacion"
                class="border p-2 rounded-md">
                <option value="union">∪</option>
                <option value="interseccion">∩</option>
                <option value="diferencia">−</option>
                <option value="simetrica">Δ</option>
            </select>

            <input type="text" id="selectConjunto2" placeholder="B"
                class="border p-2 rounded-md text-center">
        </div>

        <!-- BOTÓN PRINCIPAL -->
        <button onclick="procesar()"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
            Procesar Conjuntos <i class="fas fa-arrow-right ml-2"></i>
        </button>

        <!-- RESULTADOS -->
        <div id="resultados" class="mt-6">

            <h3 class="text-gray-600 font-semibold mb-2">Vista previa:</h3>

            <p id="pantallaU" class="text-sm text-gray-500">U = { }</p>
            <p id="pantallaA" class="text-sm text-gray-500">A = { }</p>
            <p id="pantallaB" class="text-sm text-gray-500">B = { }</p>

            <div class="mt-4 bg-blue-50 border border-blue-200 p-4 rounded-lg">
                <h4 class="font-semibold text-blue-700">Resultado</h4>
                <p id="pantallaResultado" class="font-bold">
                    Esperando operación...
                </p>
            </div>
            <p class="text-center text-gray-500 mb-6">
            Hecho por:
            Angel Gutierrez,
            Luis Dominguez,
            Diego Gonzalez,     
        </p>

        </div>
    </div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        let contador = 2;

        function obtenerNombreConjunto(n) {
            let nombre = "";
            while (n > 0) {
                let rem = (n - 1) % 26;
                nombre = String.fromCharCode(65 + rem) + nombre;
                n = Math.floor((n - 1) / 26);
            }
            return nombre;
        }

        document.getElementById('agregar').addEventListener('click', function () {
            const nombreActual = obtenerNombreConjunto(contador);
            const contenedor = document.getElementById('contenedor-conjuntos');

            const nuevo = document.createElement('div');

            nuevo.innerHTML = `
                <label class="font-semibold text-gray-700">Conjunto ${nombreActual}</label>
                <div class="flex mt-1">
                    <input type="file" id="archivo${nombreActual}" accept=".txt"
                        class="w-full border p-2 rounded-md">
                    <button onclick="this.parentElement.parentElement.remove()"
                        class="ml-2 bg-red-500 text-white px-2 rounded-md">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;

            contenedor.appendChild(nuevo);
            contador++;
        });
    </script>

    <script src="script 1.js"></script>

</body>
</html>
